services:
    app:
        build: .
        image: greenhouse-mgmt-app
        restart: unless-stopped
        ports:
            - "8080:80"
        environment:
            # Container networking — always these values regardless of .env,
            # since the host's own MySQL (if any) uses different credentials.
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: "3306"
            DB_DATABASE: greenhouse_db
            DB_USERNAME: greenhouse
            DB_PASSWORD: greenhouse_secret
        volumes:
            - ./.env:/var/www/html/.env
            - app_storage:/var/www/html/storage
        depends_on:
            db:
                condition: service_healthy
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost/"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

    scheduler:
        image: greenhouse-mgmt-app
        restart: unless-stopped
        command: ["php", "artisan", "schedule:work"]
        environment:
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: "3306"
            DB_DATABASE: greenhouse_db
            DB_USERNAME: greenhouse
            DB_PASSWORD: greenhouse_secret
        volumes:
            - ./.env:/var/www/html/.env
            - app_storage:/var/www/html/storage
        depends_on:
            app:
                condition: service_healthy

    db:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: greenhouse_db
            MYSQL_USER: greenhouse
            MYSQL_PASSWORD: greenhouse_secret
            MYSQL_ROOT_PASSWORD: greenhouse_root_secret
        ports:
            - "3307:3306"
        volumes:
            - dbdata:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p$$MYSQL_ROOT_PASSWORD"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 20s

volumes:
    dbdata:
    app_storage:
